; =============================================================================
; LAMP Stack - Custom PHP Configuration
; Mounted into container at: /usr/local/etc/php/conf.d/custom.ini
; Edit this file directly on UnRAID - no rebuild needed, just restart container
; =============================================================================

; =============================================================================
; FILE UPLOADS
; =============================================================================
upload_max_filesize = 512M
post_max_size = 512M
max_file_uploads = 20

; =============================================================================
; MEMORY AND PERFORMANCE
; =============================================================================
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; =============================================================================
; ERROR REPORTING
; Development friendly settings - show all errors
; NOTE: These should never be used on a production server
; =============================================================================
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
error_log = /var/log/php/error.log

; =============================================================================
; XDEBUG CONFIGURATION
; start_with_request = trigger means XDebug only activates when you
; deliberately trigger it (via browser extension or XDEBUG_TRIGGER cookie).
; Normal page loads are unaffected - this was the cause of slow page loads.
; =============================================================================
xdebug.mode = develop,debug
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.start_with_request = trigger
xdebug.log = /var/log/php/xdebug.log

; =============================================================================
; OPCACHE CONFIGURATION
; =============================================================================
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0

; =============================================================================
; MISCELLANEOUS
; =============================================================================
date.timezone = Europe/London
default_charset = UTF-8
short_open_tag = On
