# =============================================================================
# LAMP Stack - Default Virtual Host
# Serves the default landing page at the configured WEBSERVER_IP
# This is the fallback site when no other virtual host matches
# =============================================================================
<VirtualHost _default_:80>
    ServerName 192.168.0.23
    ServerAlias localhost 127.0.0.1
    DocumentRoot /var/www/html/default
    <Directory /var/www/html/default>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>
    CustomLog /var/log/apache2/default-access.log combined
    ErrorLog /var/log/apache2/default-error.log
</VirtualHost>
