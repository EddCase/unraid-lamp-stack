# =============================================================================
# LAMP Stack - Default Virtual Host
# Serves the default landing page at the configured WEBSERVER_IP
# This is the fallback site when no other virtual host matches
# =============================================================================

<VirtualHost *:80>
    # Responds to the server IP and localhost
    ServerName localhost
    ServerAlias 127.0.0.1

    # Where the default site files live inside the container
    DocumentRoot /var/www/html/default

    <Directory /var/www/html/default>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    # Access log - records every request made to this site
    CustomLog /var/log/apache2/default-access.log combined

    # Error log - records any errors Apache encounters
    ErrorLog /var/log/apache2/default-error.log

</VirtualHost>
