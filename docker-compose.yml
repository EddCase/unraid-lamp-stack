# =============================================================================
# LAMP Stack - Docker Compose Configuration
# Manages three containers as a single stack via UnRAID Compose Manager:
#   1. lampstack   - Custom Apache/PHP/Composer image (eddcase/lamp-stack)
#   2. mariadb     - Database server
#   3. phpmyadmin  - Database management UI
#
# Configuration is handled via the .env file in the same directory
# All user configurable values are defined there
# =============================================================================

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  lamp_network:
    driver: bridge
    ipam:
      config:
        # Subnet is configurable via LAMP_SUBNET in .env
        # Change if it conflicts with existing networks on your server
        # Check existing networks with: docker network ls
        - subnet: ${LAMP_SUBNET}

  br0:
    external: true

# =============================================================================
# VOLUMES
# All paths are derived from APPDATA_PATH defined in .env
# =============================================================================

volumes:
  websites:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA_PATH}/websites

  database:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA_PATH}/database

  logs_apache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA_PATH}/logs/apache

  logs_php:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA_PATH}/logs/php

  vhosts:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA_PATH}/config/vhosts

  config_apache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA_PATH}/config/apache

  config_php:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA_PATH}/config/php

  config_env:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA_PATH}/config/env

# =============================================================================
# SERVICES
# =============================================================================

services:

  # ===========================================================================
  # SERVICE 1: LAMP Stack - Apache/PHP/Composer
  # Accessible directly via br0 IP (192.168.0.23) - no port mapping needed
  # ===========================================================================

  lampstack:
    image: eddcase/lamp-stack:latest
    container_name: LampStack
    restart: unless-stopped

    networks:
      # Fixed IP on your home network via br0 macvlan
      br0:
        ipv4_address: ${WEBSERVER_IP}
      # Internal network for database connectivity
      lamp_network:
        ipv4_address: 172.21.0.2

    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"

    volumes:
      - websites:/var/www/html
      - logs_apache:/var/log/apache2
      - logs_php:/var/log/php
      - vhosts:/etc/apache2/sites-available/vhosts
      # Config files mounted from UnRAID - edit these directly, no rebuild needed
      - config_apache:/etc/apache2/conf-available
      - config_php:/usr/local/etc/php/conf.d
      # Env config mounted from UnRAID - edit config/env/.env directly, no rebuild needed
      - config_env:/var/www/config/env

    environment:
      - PUID=99
      - PGID=100
      - TZ=${TZ}

    depends_on:
      mariadb:
        condition: service_healthy

  # ===========================================================================
  # SERVICE 2: MariaDB - Database Server
  # ===========================================================================

  mariadb:
    image: mariadb:11
    container_name: LampStack-MariaDB
    restart: unless-stopped

    # MariaDB only on internal network - not exposed directly to home network
    networks:
      lamp_network:
        ipv4_address: 172.21.0.3

    volumes:
      - database:/var/lib/mysql

    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=${TZ}

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # SERVICE 3: phpMyAdmin - Database Management UI
  # Access at http://UNRAID_IP:8080 (e.g. http://192.168.0.2:8080)
  # ===========================================================================

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: LampStack-phpMyAdmin
    restart: unless-stopped

    networks:
      lamp_network:
        ipv4_address: 172.21.0.4

    ports:
      - "${PMA_PORT}:80"

    environment:
      - PMA_HOST=mariadb
      - PMA_PORT=3306
      - PMA_ARBITRARY=1
      - TZ=${TZ}

    depends_on:
      mariadb:
        condition: service_healthy
